name: Backfill Content Covers

# Manually-triggered one-off: generate covers/thumbnails for a user's existing
# content (PULSE/ARIA/SIGNAL/STORIES). Runs on EC2 via AWS SSM — the same channel
# the deploy uses, so no manual SSH is needed. Idempotent; safe to re-run.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Account email to backfill covers for"
        required: true
        default: "adel.haidar@outlook.com"

permissions:
  id-token: write
  contents: read

jobs:
  backfill:
    name: Backfill covers via SSM
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Run backfill-covers via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -e\",
              \"sudo -u ${{ secrets.EC2_USER }} bash -c 'cd ~/personal-intelligence && set -a && . ./.env && set +a && source .venv/bin/activate && python manage.py backfill-covers --email=${{ inputs.email }}'\"
            ]" \
            --timeout-seconds 120 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until complete (max ~12 min — fal renders are a few seconds each).
          for i in $(seq 1 72); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text)
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "=== Output ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              echo "Backfill successful."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "=== stdout ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              echo "=== stderr ==="
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              echo "Backfill failed with status: $STATUS"
              exit 1
            fi
          done
          echo "Timed out waiting for SSM command."
          exit 1
