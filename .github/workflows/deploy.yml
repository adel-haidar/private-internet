name: Deploy personal-intelligence

on:
  push:
    branches: [main]

# Required for OIDC token request
permissions:
  id-token: write
  contents: read

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Backend → EC2 (via AWS SSM)
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, '[deploy-all]') ||
      !startsWith(github.event.head_commit.message, 'feat(dashboard)')

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -e\",
              \"echo ==> Pulling latest code...\",
              \"sudo -u ${{ secrets.EC2_USER }} bash -c 'cd ~/personal-intelligence && git pull origin main'\",
              \"echo ==> Installing dependencies...\",
              \"sudo -u ${{ secrets.EC2_USER }} bash -c 'cd ~/personal-intelligence && source .venv/bin/activate && pip install -r agents/requirements.txt --quiet'\",
              \"echo ==> Restarting services...\",
              \"systemctl restart personal-intelligence-api\",
              \"systemctl restart personal-intelligence-agents\",
              \"systemctl restart nginx\",
              \"echo ==> Verifying services...\",
              \"systemctl is-active --quiet personal-intelligence-api    && echo api:    OK\",
              \"systemctl is-active --quiet personal-intelligence-agents && echo agents: OK\"
            ]" \
            --timeout-seconds 120 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until complete (max ~3 min)
          for i in $(seq 1 18); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text)
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              echo "Deploy successful."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
          done
          echo "Timed out waiting for SSM command."
          exit 1

  # ─────────────────────────────────────────────
  # JOB 2 — Dashboard → S3 + CloudFront
  # ─────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Vue Dashboard to S3 + CloudFront
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, '[deploy-all]') ||
      !startsWith(github.event.head_commit.message, 'feat(backend)')

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID }}

      # ↓ OIDC — no stored AWS keys needed
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Sync dist/ to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_DASHBOARD_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html s3://${{ secrets.S3_DASHBOARD_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
