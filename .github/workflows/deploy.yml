name: Deploy private-internet

on:
  push:
    branches: [main]

# Required for OIDC token request
permissions:
  id-token: write
  contents: read

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Backend → EC2 (via AWS SSM)
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, '[deploy-all]') ||
      (!startsWith(github.event.head_commit.message, 'feat(dashboard)') &&
       !startsWith(github.event.head_commit.message, 'fix(dashboard)'))

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -e\",
              \"echo ==> Pulling latest code...\",
              \"sudo -u ${{ secrets.EC2_USER }} bash -c 'cd ~/personal-intelligence && git fetch origin main && git reset --hard origin/main'\",
              \"echo ==> Installing dependencies...\",
              \"sudo -u ${{ secrets.EC2_USER }} bash -c 'cd ~/personal-intelligence && source .venv/bin/activate && pip install -e . --quiet && pip install -r agents/requirements.txt --quiet'\",
              \"echo '==> Deploying systemd units - names unchanged, contents reference the private_internet package...'\",
              \"cp /home/${{ secrets.EC2_USER }}/personal-intelligence/systemd/personal-intelligence-api.service /etc/systemd/system/personal-intelligence-api.service\",
              \"cp /home/${{ secrets.EC2_USER }}/personal-intelligence/systemd/personal-intelligence-agents.service /etc/systemd/system/personal-intelligence-agents.service\",
              \"cp /home/${{ secrets.EC2_USER }}/personal-intelligence/systemd/content-generation.service /etc/systemd/system/content-generation.service\",
              \"cp /home/${{ secrets.EC2_USER }}/personal-intelligence/systemd/content-generation.timer /etc/systemd/system/content-generation.timer\",
              \"cp /home/${{ secrets.EC2_USER }}/personal-intelligence/systemd/health-daily.service /etc/systemd/system/health-daily.service\",
              \"cp /home/${{ secrets.EC2_USER }}/personal-intelligence/systemd/health-daily.timer /etc/systemd/system/health-daily.timer\",
              \"systemctl daemon-reload\",
              \"systemctl enable --now content-generation.timer || echo 'WARN: could not enable content-generation.timer'\",
              \"systemctl enable --now health-daily.timer || echo 'WARN: could not enable health-daily.timer'\",
              \"echo ==> Deploying nginx config...\",
              \"cp /home/${{ secrets.EC2_USER }}/personal-intelligence/nginx/personal-intelligence.conf /etc/nginx/conf.d/personal-intelligence.conf\",
              \"echo ==> Disabling conflicting nginx server configs...\",
              \"for f in /etc/nginx/conf.d/*.conf; do if [ \$f != /etc/nginx/conf.d/personal-intelligence.conf ] && grep -q adel-intelligence.com \$f; then echo Disabling conflicting nginx config \$f; mv \$f \$f.disabled; fi; done\",
              \"grep -n adel-intelligence.com /etc/nginx/nginx.conf && echo WARNING: server block also defined in nginx.conf itself || true\",
              \"nginx -t\",
              \"echo ==> Restarting services...\",
              \"systemctl restart personal-intelligence-api\",
              \"systemctl restart personal-intelligence-agents\",
              \"systemctl restart nginx\",
              \"echo ==> Verifying services...\",
              \"systemctl is-active --quiet personal-intelligence-api    && echo api:    OK\",
              \"systemctl is-active --quiet personal-intelligence-agents && echo agents: OK\",
              \"echo ==> Verifying nginx routes /api/health to the agents service...\",
              \"sleep 3\",
              \"curl -s -o /dev/null -w %{http_code} -H 'Host: adel-intelligence.com' http://127.0.0.1/api/health/trends | grep -q 401 || (echo ERROR: /api/health is not reaching the agents service - the active nginx config is stale && exit 1)\",
              \"echo ==> Last 20 lines of agents log:\",
              \"journalctl -u personal-intelligence-agents -n 20 --no-pager\"
            ]" \
            --timeout-seconds 120 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until complete (max ~3 min)
          for i in $(seq 1 18); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text)
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              echo "Deploy successful."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
          done
          echo "Timed out waiting for SSM command."
          exit 1

  # ─────────────────────────────────────────────
  # JOB 2 — Dashboard → S3 + CloudFront
  # ─────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Vue Dashboard to S3 + CloudFront
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, '[deploy-all]') ||
      (!startsWith(github.event.head_commit.message, 'feat(backend)') &&
       !startsWith(github.event.head_commit.message, 'fix(backend)'))

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_OAUTH_CLIENT_ID: ${{ secrets.VITE_OAUTH_CLIENT_ID }}

      # ↓ OIDC — no stored AWS keys needed
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Sync dist/ to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_DASHBOARD_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html s3://${{ secrets.S3_DASHBOARD_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
