server {
    listen 80;
    server_name adel-intelligence.com;

    # SSL is terminated at the ALB; nginx receives plain HTTP on port 80.

    # ── Internal auth subrequest target ─────────────────────────────────────
    # Only reachable via nginx auth_request — not directly from the internet.
    location = /api/internal/auth {
        internal;
        proxy_pass         http://127.0.0.1:8000;
        proxy_pass_request_body off;
        proxy_set_header   Content-Length "";
        proxy_set_header   Host $host;
        proxy_set_header   Authorization $http_authorization;
    }

    # ── Error handler for auth_request 401s ─────────────────────────────────
    error_page 401 = @auth_required;
    location @auth_required {
        default_type application/json;
        return 401 '{"detail":"not authenticated"}';
    }

    # OpenClaw
    location /openclaw/ {
        proxy_pass http://localhost:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Agent routes — must be before the generic /api/ block (longest-prefix wins)
    location /api/banking/ {
        auth_request /api/internal/auth;
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/jobs/ {
        auth_request /api/internal/auth;
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # All other /api/* — memory, file upload, oauth (port 8000)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # OAuth authorize / token / register
    location /oauth/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # OAuth discovery document
    location /.well-known/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # MCP server (StreamableHTTP — buffering must be off)
    # No auth_request: FastMCP validates tokens itself via PostgresTokenVerifier
    # and returns WWW-Authenticate OAuth challenge headers on 401.
    # Adding nginx auth_request here strips those headers, breaking client re-auth.
    location /mcp/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }
}
