server {
    listen 443 ssl;
    server_name adel-intelligence.com;

    # SSL config (adjust cert paths as needed)
    ssl_certificate     /etc/letsencrypt/live/adel-intelligence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adel-intelligence.com/privkey.pem;

    # Serve the Vue dashboard from dist/
    root /home/ec2-user/personal-intelligence/frontend/dist;
    index index.html;

    # MCP server (FastMCP, StreamableHTTP — headers must be forwarded)
    location /mcp/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # OAuth discovery — RFC 8615, cannot move
    location /.well-known/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Agent routes — more specific than /api/, nginx longest-prefix match wins
    location /api/banking/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/jobs/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other /api/* — memory, file upload, oauth (port 8000)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name adel-intelligence.com;
    return 301 https://$host$request_uri;
}
